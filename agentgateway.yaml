# yaml-language-server: $schema=https://agentgateway.dev/schema/config
config:
  # Prometheus metrics endpoint at localhost:9091/metrics
  statsAddr: 0.0.0.0:9091
  # OpenTelemetry tracing — export spans to a local OTLP collector
  tracing:
    otlpEndpoint: http://localhost:4317
    otlpProtocol: grpc
    randomSampling: 1.0

# MCP federation — expose all 4 MCP servers behind a single endpoint.
# The support-service connects here instead of directly to each service.
mcp:
  port: 15000
  targets:
  - name: catalog-service
    mcp:
      host: ${CATALOG_SERVICE_URL:http://localhost:8081}
  - name: orders-service
    mcp:
      host: ${ORDERS_SERVICE_URL:http://localhost:8082}
  - name: customers-service
    mcp:
      host: ${CUSTOMERS_SERVICE_URL:http://localhost:8083}
  - name: notifications-service
    mcp:
      host: ${NOTIFICATIONS_SERVICE_URL:http://localhost:8084}

binds:
- port: 3000
  listeners:
  - routes:
    - backends:
      - ai:
          name: anthropic
          provider:
            anthropic:
              model: claude-sonnet-4-5-20250929
      policies:
        backendAuth:
          key: "$ANTHROPIC_API_KEY"
        localRateLimit:
        # Request-based: allow 20 requests per minute (burst to 25)
        - type: requests
          maxTokens: 25
          tokensPerFill: 20
          fillInterval: 60s
        # Token-based: allow 50,000 LLM tokens per hour
        - type: tokens
          maxTokens: 50000
          tokensPerFill: 50000
          fillInterval: 3600s
