server:
  port: 8080

spring:
  ai:
    anthropic:
      base-url: ${SPRING_AI_ANTHROPIC_BASE_URL:http://localhost:3000}
      api-key: not-used
      chat:
        options:
          # Model and max-tokens are enforced by Agent Gateway (overrides).
          # This placeholder satisfies Spring AI's requirement for a model name.
          model: placeholder
    mcp:
      client:
        http:
          connections:
            catalog-service:
              url: ${CATALOG_SERVICE_URL:http://localhost:8081}
            orders-service:
              url: ${ORDERS_SERVICE_URL:http://localhost:8082}
            customers-service:
              url: ${CUSTOMERS_SERVICE_URL:http://localhost:8083}
            notifications-service:
              url: ${NOTIFICATIONS_SERVICE_URL:http://localhost:8084}
  datasource:
    url: jdbc:h2:mem:cloudcartsupport
    driver-class-name: org.h2.Driver
    username: sa
    password:
  h2:
    console:
      enabled: true
      path: /h2-console
  jpa:
    hibernate:
      ddl-auto: create
    show-sql: false
    properties:
      hibernate:
        format_sql: true
  thymeleaf:
    cache: false

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when-authorized
