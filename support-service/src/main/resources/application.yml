server:
  port: 8080

spring:
  ai:
    anthropic:
      base-url: ${SPRING_AI_ANTHROPIC_BASE_URL:http://localhost:3000}
      api-key: not-used
      chat:
        options:
          model: claude-sonnet-4-5-20250929
          max-tokens: 4096
    mcp:
      client:
        http:
          connections:
            # Single connection to Agent Gateway's federated MCP endpoint.
            # The gateway multiplexes tools from all 4 backend MCP servers.
            agentgateway:
              url: ${MCP_GATEWAY_URL:http://localhost:15000}
  datasource:
    url: jdbc:h2:mem:cloudcartsupport
    driver-class-name: org.h2.Driver
    username: sa
    password:
  h2:
    console:
      enabled: true
      path: /h2-console
  jpa:
    hibernate:
      ddl-auto: create
    show-sql: false
    properties:
      hibernate:
        format_sql: true
  thymeleaf:
    cache: false

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when-authorized
