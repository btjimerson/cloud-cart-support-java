server:
  port: 8080

# Agent orchestration is now handled by kagent (Kubernetes CRDs).
# The support-service is just the UI + A2A client.
# No Spring AI Anthropic or MCP client config needed.
kagent:
  a2a:
    base-url: ${KAGENT_A2A_URL:http://localhost:8083}
    namespace: ${KAGENT_NAMESPACE:kagent}

spring:
  datasource:
    url: jdbc:h2:mem:cloudcartsupport
    driver-class-name: org.h2.Driver
    username: sa
    password:
  h2:
    console:
      enabled: true
      path: /h2-console
  jpa:
    hibernate:
      ddl-auto: create
    show-sql: false
    properties:
      hibernate:
        format_sql: true
  thymeleaf:
    cache: false

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when-authorized
