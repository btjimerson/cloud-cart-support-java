apiVersion: apps/v1
kind: Deployment
metadata:
  name: notifications-service
  namespace: cloud-cart-support
  labels:
    app: notifications-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: notifications-service
  template:
    metadata:
      labels:
        app: notifications-service
    spec:
      imagePullSecrets:
        - name: ghcr-secret
      containers:
        - name: notifications-service
          image: ghcr.io/btjimerson/cloud-cart-support-java/notifications-service:latest
          ports:
            - containerPort: 8080
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8080
            initialDelaySeconds: 20
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: notifications-service
  namespace: cloud-cart-support
spec:
  selector:
    app: notifications-service
  ports:
    - port: 8080
      targetPort: 8080
