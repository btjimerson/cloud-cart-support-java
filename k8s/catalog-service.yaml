apiVersion: apps/v1
kind: Deployment
metadata:
  name: catalog-service
  namespace: cloud-cart-support
  labels:
    app: catalog-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: catalog-service
  template:
    metadata:
      labels:
        app: catalog-service
    spec:
      imagePullSecrets:
        - name: ghcr-secret
      containers:
        - name: catalog-service
          image: ghcr.io/btjimerson/cloud-cart-support-java/catalog-service:latest
          ports:
            - containerPort: 8080
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8080
            initialDelaySeconds: 20
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: catalog-service
  namespace: cloud-cart-support
  labels:
    kagent.dev/mcp-service: "true"
  annotations:
    kagent.dev/mcp-service-path: /sse
    kagent.dev/mcp-service-port: "8080"
    kagent.dev/mcp-service-protocol: SSE
spec:
  selector:
    app: catalog-service
  ports:
    - appProtocol: mcp
      port: 8080
      targetPort: 8080
