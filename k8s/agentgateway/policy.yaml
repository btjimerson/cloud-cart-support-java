apiVersion: enterpriseagentgateway.solo.io/v1alpha1
kind: EnterpriseAgentgatewayPolicy
metadata:
  name: prompt-guard-policy
  namespace: agentgateway-system
spec:
  targetRefs:
    - group: gateway.networking.k8s.io
      kind: HTTPRoute
      name: anthropic-route
  backend:
    ai:
      # Routes must be in the same policy as promptGuard to avoid silent
      # policy conflict (see agentgateway-enterprise#149, #267)
      routes:
        "/v1/chat/completions": Completions
        "/v1/messages": Messages
        "/v1/models": Models
        "*": Passthrough
      promptGuard:
        request:
          - regex:
              action: Reject
              matches:
                - "(?i)(violence|weapon|drug|illegal|hack|exploit|kill|harm|steal|fraud|scam|phishing|porn|abuse|threat)"
            response:
              message: "Your message was blocked because it contains inappropriate content."
              statusCode: 403
          - regex:
              action: Mask
              builtins:
                - CreditCard
                - Ssn
                - Email
                - PhoneNumber
