apiVersion: enterpriseagentgateway.solo.io/v1alpha1
kind: EnterpriseAgentgatewayPolicy
metadata:
  name: prompt-guard-policy
  namespace: agentgateway-system
spec:
  targetRefs:
    - group: gateway.networking.k8s.io
      kind: HTTPRoute
      name: anthropic-route
  promptGuard:
    request:
      customResponseMessage: "Your message was blocked because it contains inappropriate content."
      reject:
        - pattern: "(?i)(violence|weapon|drug|illegal|hack|exploit|kill|harm|steal|fraud|scam|phishing|porn|abuse|threat)"
          action: REJECT
      mask:
        builtins:
          - CREDIT_CARD
          - SSN
          - EMAIL
          - PHONE_NUMBER
