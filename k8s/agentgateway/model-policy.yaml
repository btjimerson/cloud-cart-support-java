apiVersion: agentgateway.dev/v1alpha1
kind: AgentgatewayPolicy
metadata:
  name: anthropic-model-policy
  namespace: agentgateway-system
spec:
  targetRefs:
    - group: agentgateway.dev
      kind: AgentgatewayBackend
      name: anthropic
  backend:
    ai:
      defaults:
        - field: model
          value: claude-sonnet-4-5-20250929
        - field: temperature
          value: "0.7"
      overrides:
        - field: max_tokens
          value: "4096"
