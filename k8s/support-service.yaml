apiVersion: apps/v1
kind: Deployment
metadata:
  name: support-service
  namespace: cloud-cart-support
  labels:
    app: support-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: support-service
  template:
    metadata:
      labels:
        app: support-service
    spec:
      containers:
        - name: support-service
          image: ghcr.io/btjimerson/cloud-cart-support-java/support-service:step-7-declarative-agents
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
          env:
            - name: KAGENT_A2A_URL
              value: "http://kagent-controller.kagent.svc:8083"
            - name: KAGENT_NAMESPACE
              value: "kagent"
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8080
            initialDelaySeconds: 20
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: support-service
  namespace: cloud-cart-support
spec:
  type: NodePort
  selector:
    app: support-service
  ports:
    - port: 8080
      targetPort: 8080
