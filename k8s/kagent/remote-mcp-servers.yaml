apiVersion: kagent.dev/v1alpha2
kind: RemoteMCPServer
metadata:
  name: orders-service
  namespace: kagent
spec:
  description: Order management MCP tool server
  url: http://orders-service.cloud-cart-support:8080/sse
  protocol: SSE
  sseReadTimeout: 5m0s
  terminateOnClose: true
  timeout: 30s
