<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cloud Cart Support - AI-Powered Customer Support</title>
    <link rel="icon" type="image/png" href="/images/favicon.png">

    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">

    <!-- Custom CSS -->
    <link href="/css/styles.css" rel="stylesheet">
</head>
<body>
    <div class="d-flex flex-column vh-100">
        <!-- Header -->
        <nav class="navbar navbar-dark am-navbar px-4">
            <a class="navbar-brand d-flex align-items-center" href="/">
                <img src="/images/shop.png" class="navbar-logo d-inline-block align-text-top me-2">
                <span class="fw-bold">Cloud Cart Support</span>
            </a>
            <div class="d-flex align-items-center gap-3">
                <span id="current-agent-badge" class="badge agent-router">Router</span>
                <small id="connection-status" class="text-light">
                    <i class="bi bi-circle-fill text-secondary"></i> Connecting...
                </small>
            </div>
        </nav>

        <!-- Main Content -->
        <div class="d-flex flex-grow-1 main-content">
            <!-- Sidebar -->
            <div class="sidebar border-end p-3">
                <div class="mb-4">
                    <h6 class="sidebar-heading text-muted mb-2 fw-bold text-uppercase">Conversation</h6>
                    <small id="conversation-id" class="text-muted font-monospace">Not started</small>
                </div>

                <div>
                    <h6 class="sidebar-heading text-muted mb-2 fw-bold text-uppercase">Handoff History</h6>
                    <div id="handoff-list" class="handoff-list">
                        <small class="text-muted">No handoffs yet</small>
                    </div>
                </div>
            </div>

            <!-- Chat Area -->
            <div class="d-flex flex-column flex-grow-1 chat-area">
                <!-- Messages Container -->
                <div id="chat-messages" class="flex-grow-1 overflow-auto p-4">
                    <!-- Welcome Message -->
                    <div class="text-center text-muted my-5">
                        <img src="/images/shop.png" class="welcome-logo d-block mx-auto mb-3 opacity-50">
                        <h1 class="display-5 fw-bold text-body-emphasis">Welcome to Cloud Cart Support</h1>
                        <p class="lead">How can I help you today?</p>
                    </div>
                </div>

                <!-- Input Area -->
                <div class="border-top p-3 input-area">
                    <!-- Example Prompts -->
                    <div class="mb-2">
                        <small class="text-muted">Try asking:</small>
                        <div class="d-flex flex-wrap gap-2 mt-1">
                            <button class="btn btn-sm btn-outline-secondary example-prompt" data-prompt="Where is my order ORD-2024-0001?">
                                Where is my order ORD-2024-0001?
                            </button>
                            <button class="btn btn-sm btn-outline-secondary example-prompt" data-prompt="Can you recommend a good headset?">
                                Can you recommend a good headset?
                            </button>
                            <button class="btn btn-sm btn-outline-secondary example-prompt" data-prompt="I want to return my order">
                                I want to return my order
                            </button>
                            <button class="btn btn-sm btn-outline-secondary example-prompt" data-prompt="I need to speak to a manager">
                                I need to speak to a manager
                            </button>
                        </div>
                    </div>

                    <!-- Input Form -->
                    <div class="input-group">
                        <input type="text" id="message-input" class="form-control" placeholder="Type your message..." autocomplete="off">
                        <button id="send-button" class="btn btn-primary" type="button">
                            <i class="bi bi-send-fill"></i> Send
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Bootstrap 5 JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

    <!-- Markdown rendering -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/dompurify@3.0.6/dist/purify.min.js"></script>

    <!-- Custom JS -->
    <script src="/js/chat.js"></script>
</body>
</html>
