server:
  port: 8080

spring:
  application:
    name: notifications-service
  jpa:
    hibernate:
      ddl-auto: create
    show-sql: false
  ai:
    mcp:
      server:
        protocol: STREAMABLE
        capabilities:
          tool: true
        name: notifications-service
        version: 0.1.0

management:
  endpoints:
    web:
      exposure:
        include: health,info
